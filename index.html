<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bint's Candylicious Online Class</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff69b4, #ffc0cb);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            padding:20px;
        }

        .container{
            background:#fff;
            padding:40px;
            border-radius:20px;
            max-width:600px;
            box-shadow:0 4px 20px rgba(0,0,0,0.15);
        }

        h1{
            color:#d63384;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            color:#555;
            margin-bottom:30px;
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            background:#25D366;
            color:white;
            text-decoration:none;
            padding:15px 35px;
            border-radius:50px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s ease;
        }

        .btn:hover{
            transform:scale(1.05);
        }

        .emoji{
            font-size:50px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="emoji">🍬🍭</div>

    <h1>Welcome to Bint's Candylicious Online Class</h1>

    <p>
        Click the button below to join our WhatsApp group and begin your sweet journey into the world of candy making and confectionery skills.
    </p>

    <a class="btn"
       href="https://chat.whatsapp.com/DxABiUEPCFE0LzCq6UJnS7?mode=gi_t"
       target="_blank">
       Click Here to Join the WhatsApp Group
    </a>

</div>

</body>
</html>
